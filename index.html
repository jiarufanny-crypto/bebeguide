<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f5ede3">
<title>Bébé Guide · 宝宝手册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --cream:#f7f1e8;--warm:#f0e4d0;--peach:#e8c4a0;
  --terra:#c17b52;--bark:#7a4f35;
  --sage:#7b9e87;--sage-light:#d4e8db;
  --blue-soft:#b8cfe8;--blue-deep:#4a7fa5;
  --amber:#e8a83a;
  --text:#3a2e26;--text-muted:#8a7060;
  --border:rgba(122,79,53,0.13);
  --card:rgba(255,255,255,0.72);
  --r:16px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(225,195,160,.35) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 10% 80%,rgba(180,210,190,.25) 0%,transparent 60%);pointer-events:none;z-index:0}

/* header */
.app-header{position:sticky;top:0;z-index:100;background:rgba(247,241,232,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.app-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--bark);white-space:nowrap}
.app-subtitle{font-size:11px;color:var(--text-muted)}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.month-btn-main{background:var(--terra);color:#fff;font-size:12px;font-weight:500;padding:6px 12px;border-radius:99px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;white-space:nowrap}

/* nav tabs */
.nav-tabs{display:flex;gap:6px;padding:11px 14px 0;overflow-x:auto;scrollbar-width:none;position:relative;z-index:1}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;transition:all .2s;backdrop-filter:blur(8px)}
.nav-tab.active{background:var(--bark);color:#fff;border-color:var(--bark)}

/* main */
.main{padding:13px 13px 96px;position:relative;z-index:1}
.view{display:none}.view.active{display:block}

/* month modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(58,46,38,.5);display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--cream);border-radius:24px 24px 0 0;padding:22px 16px 40px;width:100%;max-width:480px;animation:slideUp .26s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-sheet h3{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:14px;color:var(--bark)}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.month-opt{font-family:'DM Sans',sans-serif;padding:12px 6px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .2s}
.month-opt.active,.month-opt:hover{background:var(--bark);color:#fff;border-color:var(--bark)}
.month-opt small{font-size:10px;opacity:.7;display:block;margin-top:2px}

/* toolbar */
.toolbar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tb-btn{display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .2s;backdrop-filter:blur(6px)}
.tb-btn:hover{border-color:var(--terra);color:var(--terra)}
.tb-btn.primary{background:var(--bark);color:#fff;border-color:var(--bark)}
.tb-btn.primary:hover{background:var(--terra);border-color:var(--terra)}
.tb-icon{font-size:14px}

/* progress card */
.progress-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:16px;margin-bottom:4px;backdrop-filter:blur(8px)}
.ring-wrap{position:relative;width:68px;height:68px;flex-shrink:0}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--warm);stroke-width:5}
.ring-fill{fill:none;stroke:var(--sage);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .5s}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:17px;font-weight:500;color:var(--bark);line-height:1}
.ring-sub{font-size:10px;color:var(--text-muted)}
.prog-info h3{font-family:'DM Serif Display',serif;font-size:16px;color:var(--bark);margin-bottom:3px}
.prog-info p{font-size:13px;color:var(--text-muted);line-height:1.5}

/* sec label */
.sec-label{font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--text-muted);text-transform:uppercase;margin:16px 0 8px}

/* week card */
.wcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;backdrop-filter:blur(8px)}
.wcard-hdr{display:flex;align-items:center;gap:9px;padding:12px 13px;cursor:pointer;user-select:none}
.wpill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;white-space:nowrap}
.wcard-title{font-size:14px;font-weight:500;flex:1;min-width:0}
.wcard-prog{font-size:12px;color:var(--text-muted);white-space:nowrap}
.wchev{font-size:13px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.wcard.open .wchev{transform:rotate(180deg)}
.wbody{display:none;padding:0 11px 10px}
.wcard.open .wbody{display:block}

/* todo item */
.todo{display:flex;align-items:flex-start;gap:10px;padding:10px 2px;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.todo:last-child{border-bottom:none}
.todo.done{opacity:.4}
.tbox{width:20px;height:20px;flex-shrink:0;border:1.5px solid var(--peach);border-radius:6px;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.todo.done .tbox{background:var(--sage);border-color:var(--sage)}
.tcheck{color:#fff;font-size:11px;display:none}
.todo.done .tcheck{display:block}
.tcontent{flex:1;min-width:0}
.ttext{font-size:14px;line-height:1.5;word-break:break-word}
.todo.done .ttext{text-decoration:line-through}
.tmeta{font-size:11px;color:var(--text-muted);margin-top:2px}
.tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:99px;margin-right:3px}
.t-oblig{background:#fce8e8;color:#a03030}
.t-sante{background:var(--sage-light);color:#3d6b4f}
.t-admin{background:var(--blue-soft);color:var(--blue-deep)}
.t-daily{background:var(--warm);color:var(--bark)}
.t-parent{background:#ede8fc;color:#5a3a9a}
.t-allait{background:#fdf0d8;color:#8a5a10}

/* add form */
.add-btn{display:flex;align-items:center;gap:7px;width:100%;padding:10px 13px;background:transparent;border:1.5px dashed var(--peach);border-radius:var(--r-sm);color:var(--terra);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:5px;transition:all .2s}
.add-btn:hover{background:var(--warm)}
.add-form{display:none;background:var(--warm);border-radius:var(--r-sm);padding:12px;margin-top:7px;border:1px solid var(--border)}
.add-form.open{display:block}
.add-form input,.add-form select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);margin-bottom:7px;outline:none}
.add-form input:focus,.add-form select:focus{border-color:var(--terra)}
.add-row{display:flex;gap:7px}
.add-row button{flex:1;padding:9px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.btn-ok{background:var(--bark);color:#fff}
.btn-no{background:rgba(122,79,53,.1);color:var(--text-muted)}
.form-title{font-size:13px;font-weight:500;color:var(--bark);margin-bottom:9px}
.form-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;display:block}

/* knowledge card */
.kb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;backdrop-filter:blur(8px)}
.kb-hdr{display:flex;align-items:center;gap:11px;padding:14px;cursor:pointer}
.kb-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.kb-card-title{font-size:15px;font-weight:500}
.kb-card-sub{font-size:12px;color:var(--text-muted)}
.kb-body{display:none;padding:13px 14px;font-size:13px;line-height:1.75;color:var(--text);border-top:1px solid var(--border)}
.kb-card.open .kb-body{display:block}
.kb-body strong{color:var(--bark)}
.kb-hr{border:none;border-top:1px solid var(--border);margin:9px 0}
.alert-box{background:#fdf0d8;border-left:3px solid var(--amber);border-radius:0 7px 7px 0;padding:9px 11px;margin-top:9px;font-size:12px;color:#7a5010}
.src{font-size:11px;color:var(--text-muted);margin-top:11px;font-style:italic}
.kb-custom-badge{font-size:10px;font-weight:500;background:#f7e8fc;color:#7a2fa0;padding:2px 6px;border-radius:99px;margin-left:6px}
.kb-del-btn{margin-left:auto;font-size:18px;color:var(--text-muted);flex-shrink:0;line-height:1;padding:2px 4px;border-radius:4px;cursor:pointer;background:none;border:none;font-family:sans-serif}
.kb-del-btn:hover{color:#b84848;background:#fce8e8}

/* kb add form */
.kb-add-btn{display:flex;align-items:center;gap:7px;width:100%;padding:10px 13px;background:transparent;border:1.5px dashed var(--blue-soft);border-radius:var(--r-sm);color:var(--blue-deep);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:5px;transition:all .2s}
.kb-add-btn:hover{background:#e8f2fc}
.kb-add-form{display:none;background:#e8f2fc;border-radius:var(--r-sm);padding:12px;margin-top:7px;border:1px solid var(--blue-soft)}
.kb-add-form.open{display:block}
.kb-add-form input,.kb-add-form textarea,.kb-add-form select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);margin-bottom:7px;outline:none}
.kb-add-form textarea{resize:vertical;min-height:90px}
.kb-add-form input:focus,.kb-add-form textarea:focus{border-color:var(--blue-deep)}

/* vaccines */
.vrow{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.vrow:last-child{border-bottom:none}
.vdot{flex-shrink:0;width:8px;height:8px;border-radius:50%;margin-top:6px}
.vage{font-size:13px;font-weight:500;color:var(--bark);margin-bottom:2px}
.vtext{font-size:13px;color:var(--text)}
.vfr{font-size:11px;color:var(--text-muted);margin-top:2px}

/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bark);color:#fff;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(247,241,232,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;z-index:100}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 13px;gap:2px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text-muted);transition:color .2s}
.bnav.active{color:var(--bark)}
.bnav-icon{font-size:18px}
.bnav-label{font-size:10px;font-weight:500}

.empty{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:14px}
.empty span{font-size:34px;display:block;margin-bottom:11px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="position:fixed;inset:0;z-index:500;background:var(--cream);display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:340px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:48px;margin-bottom:12px">👶</div>
      <div style="font-family:'DM Serif Display',serif;font-size:28px;color:var(--bark)">Bébé Guide</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:4px">宝宝成长手册 · 家庭版</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;backdrop-filter:blur(8px)">
      <div style="font-size:14px;font-weight:500;color:var(--bark);margin-bottom:16px">输入家庭密码 · Mot de passe</div>
      <input type="password" id="pwInput" placeholder="家庭密码…" onkeydown="if(event.key==='Enter')doLogin()"
        style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;margin-bottom:10px"/>
      <div id="pwError" style="font-size:12px;color:#c84040;margin-bottom:10px;display:none">密码错误，请重试</div>
      <button onclick="doLogin()" style="width:100%;padding:12px;border-radius:10px;border:none;background:var(--bark);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer">进入 · Entrer</button>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--text-muted)">家庭成员共享同一密码，数据实时同步</div>
  </div>
</div>

<header class="app-header">
  <div>
    <div class="app-title">Bébé Guide</div>
    <div class="app-subtitle">宝宝成长手册 · 0–6 mois</div>
  </div>
  <div class="hdr-right">
    <button class="month-btn-main" id="monthBtnMain" onclick="openModal()">第1个月 ▾</button>
  </div>
</header>

<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal-sheet">
    <h3>选择月龄 · Choisir le mois</h3>
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" id="ttab-todo" onclick="switchTab('todo')">✅ 待办清单</button>
  <button class="nav-tab" id="ttab-knowledge" onclick="switchTab('knowledge')">📖 育儿知识</button>
  <button class="nav-tab" id="ttab-vaccines" onclick="switchTab('vaccines')">💉 疫苗日历</button>
  <button class="nav-tab" id="ttab-doctor" onclick="switchTab('doctor')">🩺 咨询医生</button>
</div>

<main class="main">
  <div class="view active" id="view-todo"></div>
  <div class="view" id="view-knowledge"></div>
  <div class="view" id="view-vaccines"></div>
  <div class="view" id="view-doctor"></div>
</main>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="bnav active" id="bnav-todo" onclick="switchTab('todo')">
    <span class="bnav-icon">☑️</span><span class="bnav-label">待办</span>
  </button>
  <button class="bnav" id="bnav-knowledge" onclick="switchTab('knowledge')">
    <span class="bnav-icon">📖</span><span class="bnav-label">知识</span>
  </button>
  <button class="bnav" id="bnav-vaccines" onclick="switchTab('vaccines')">
    <span class="bnav-icon">💉</span><span class="bnav-label">疫苗</span>
  </button>
  <button class="bnav" id="bnav-doctor" onclick="switchTab('doctor')">
    <span class="bnav-icon">🩺</span><span class="bnav-label">问诊</span>
  </button>
</nav>

<script>
// ══════════════════════════════════════════
//  PRESET DATA
// ══════════════════════════════════════════
var MONTHS=[
  {zh:'第1个月',fr:'Mois 1',key:'m1'},{zh:'第2个月',fr:'Mois 2',key:'m2'},
  {zh:'第3个月',fr:'Mois 3',key:'m3'},{zh:'第4个月',fr:'Mois 4',key:'m4'},
  {zh:'第5个月',fr:'Mois 5',key:'m5'},{zh:'第6个月',fr:'Mois 6',key:'m6'}
];

var TODO_DATA={
m1:[
  {id:'m1s0',label:'产院期间',fr:'À la maternité',pill:'🏥 Maternité',pc:'#fdf0d8',pt:'#8a5a10',items:[

    {t:'新生儿筛查 test de Guthrie（48–72h，足跟血，16种罕见病）',fr:'Dépistage néonatal Guthrie J2–J3',tag:'sante',tl:'医疗'},

  {id:'m1s3',label:'第3–4周',fr:'Semaines 3–4 · J15–J28',pill:'J15–J28',pc:'#ede8fc',pt:'#5a3a9a',items:[

    {t:'第1个月义务体检（visite du 1er mois）',fr:'Consultation obligatoire du 1er mois',tag:'oblig',tl:'义务'},
    {t:'确认BCG卡介苗（高风险地区，如Île-de-France）',fr:'Vaccin BCG si indication',tag:'oblig',tl:'疫苗'},

function getCKb(m){return customKb[m]||(customKb[m]=[]);}

// ══════════════════════════════════════════
//  SUPABASE LOAD ALL DATA
// ══════════════════════════════════════════
async function loadAll(){
  try{
    // checked items
    var r1=await db.from('checked_items').select('*');
    if(r1.data) r1.data.forEach(function(row){checked[row.id]=row.checked;});

    // custom todos
    var r2=await db.from('custom_todos').select('*').order('created_at');
    if(r2.data) r2.data.forEach(function(row){
      if(!customTodos[row.month])customTodos[row.month]=[];
      customTodos[row.month].push({id:row.id,t:row.text,fr:row.fr||'',tag:row.tag||'daily',tl:row.tl||'自定义'});
    });

    // custom kb
    var r3=await db.from('custom_kb').select('*').order('created_at');
    if(r3.data) r3.data.forEach(function(row){
      if(!customKb[row.month])customKb[row.month]=[];
      customKb[row.month].push({id:row.id,icon:row.icon||'📝',bg:row.bg||'#fdf0d8',title:row.title,sub:row.sub||'',body:row.body||''});
    });

    // doctor questions
    var r4=await db.from('doctor_questions').select('*').order('created_at',{ascending:false});
    if(r4.data) doctorQs=r4.data.map(function(row){
      return {id:row.id,text:row.text,note:row.note||'',month:row.month||'',urgent:row.urgent,done:row.done,answer:row.answer||''};
    });
  }catch(e){console.error('loadAll error',e);}
  renderAll();
}

// ══════════════════════════════════════════
//  SUPABASE REALTIME SUBSCRIPTIONS
// ══════════════════════════════════════════
function setupRealtime(){
  db.channel('bebe-sync')
    .on('postgres_changes',{event:'*',schema:'public',table:'checked_items'},function(payload){
      var row=payload.new||{};
      if(payload.eventType==='DELETE'){delete checked[payload.old.id];}
      else{checked[row.id]=row.checked;}
      renderTodo();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'custom_todos'},function(){
      customTodos={};
      db.from('custom_todos').select('*').order('created_at').then(function(r){
        if(r.data) r.data.forEach(function(row){
          if(!customTodos[row.month])customTodos[row.month]=[];
          customTodos[row.month].push({id:row.id,t:row.text,fr:row.fr||'',tag:row.tag||'daily',tl:row.tl||'自定义'});
        });
        renderTodo();
      });
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'custom_kb'},function(){
      customKb={};
      db.from('custom_kb').select('*').order('created_at').then(function(r){
        if(r.data) r.data.forEach(function(row){
          if(!customKb[row.month])customKb[row.month]=[];
          customKb[row.month].push({id:row.id,icon:row.icon||'📝',bg:row.bg||'#fdf0d8',title:row.title,sub:row.sub||'',body:row.body||''});
        });
        renderKnowledge();
      });
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'doctor_questions'},function(){
      db.from('doctor_questions').select('*').order('created_at',{ascending:false}).then(function(r){
        if(r.data) doctorQs=r.data.map(function(row){
          return {id:row.id,text:row.text,note:row.note||'',month:row.month||'',urgent:row.urgent,done:row.done,answer:row.answer||''};
        });
        renderDoctor();
      });
    })
    .subscribe();
}

function exportExcel(){
  var rows=[['月份/Mois','分组/Section','事项/Tâche','法语/Français','分类/Catégorie','标签/Tag','已完成/Fait']];
  MONTHS.forEach(function(mo){
    var secs=TODO_DATA[mo.key]||[];
    secs.forEach(function(sec){
      sec.items.forEach(function(item,i){
        var id=sec.id+'_'+i;
        rows.push([mo.zh,sec.label,item.t,item.fr,item.tl,item.tag,checked[id]?'✓':'']);
      });
    });
    getCTodos(mo.key).forEach(function(c,i){
      var id='cx_'+mo.key+'_'+i;
      rows.push([mo.zh,'自定义',c.t,c.fr||'',c.tl||c.tag,c.tag,checked[id]?'✓':'']);
    });
  });
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:10},{wch:14},{wch:40},{wch:36},{wch:10},{wch:10},{wch:8}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'待办清单',ws);
  XLSX.writeFile(wb,'BébéGuide_待办清单.xlsx');
  toast('✅ Excel 导出成功！');
}

// ══════════════════════════════════════════
//  EXCEL IMPORT (todos)
// ══════════════════════════════════════════
function importExcel(){document.getElementById('xlsxInput').click();}

function handleImport(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1});
      var imported=0;
      for(var i=1;i<rows.length;i++){
        var r=rows[i];
        if(!r||!r[2])continue;
        var moZh=String(r[0]||'').trim();
        var mo=MONTHS.find(function(m){return m.zh===moZh;});
        if(!mo)continue;
        var text=String(r[2]).trim();
        var fr=String(r[3]||'').trim();
        var tl=String(r[4]||'自定义').trim();
        var tag=String(r[5]||'daily').trim();
        var done=String(r[6]||'').trim()==='✓';
        // skip if already exists in preset
        var exists=false;
        (TODO_DATA[mo.key]||[]).forEach(function(sec){
          sec.items.forEach(function(item){if(item.t===text)exists=true;});
        });
        if(exists){
          if(done){
            // find id and check it
            (TODO_DATA[mo.key]||[]).forEach(function(sec){
              sec.items.forEach(function(item,idx){
                if(item.t===text)checked[sec.id+'_'+idx]=true;
              });
            });
          }
          continue;
        }
        // check if already in customs
        var alreadyCx=getCTodos(mo.key).some(function(c){return c.t===text;});
        if(!alreadyCx){
          getCTodos(mo.key).push({t:text,fr:fr,tl:tl,tag:tag});
          imported++;
        }
        if(done){
          var ci=getCTodos(mo.key).findIndex(function(c){return c.t===text;});
          if(ci>=0)checked['cx_'+mo.key+'_'+ci]=true;
        }
      }
      renderAll();
      toast('📥 导入成功，新增 '+imported+' 条自定义事项');
    }catch(err){toast('❌ 导入失败：'+err.message);}
    e.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function renderTodo(){

  var cx=getCTodos(m);
  cx.forEach(function(_,i){total++;if(checked['cx_'+m+'_'+i])done++;});
  var pct=total?Math.round(done/total*100):0;
  var r=32,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  var mn=MONTHS.find(function(x){return x.key===m;});

  var html='';

  // toolbar
  html+='<div class="toolbar">'
    +'<button class="tb-btn primary" onclick="exportExcel()"><span class="tb-icon">📤</span>导出 Excel</button>'
    +'<button class="tb-btn" onclick="importExcel()"><span class="tb-icon">📥</span>导入 Excel</button>'
    +'<input type="file" id="xlsxInput" accept=".xlsx,.xls" style="display:none" onchange="handleImport(event)">'
    +'<button class="tb-btn" onclick="showExcelHelp()" style="margin-left:auto;padding:7px 9px" title="Excel格式说明">❓</button>'
    +'</div>';

  // progress ring

    +'<div class="ring-wrap"><svg class="ring-svg" width="68" height="68" viewBox="0 0 68 68">'
    +'<circle class="ring-bg" cx="34" cy="34" r="'+r+'"/>'
    +'<circle class="ring-fill" cx="34" cy="34" r="'+r+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'"/>'
    +'</svg><div class="ring-inner"><span class="ring-pct">'+pct+'%</span><span class="ring-sub">'+done+'/'+total+'</span></div></div>'
    +'<div class="prog-info"><h3>'+mn.zh+'</h3><p>已完成 <strong>'+done+'</strong> 项<br>还有 <strong>'+(total-done)+'</strong> 项待完成</p></div></div>';

  if(!data.length){
    html+='<div class="empty"><span>🌱</span>该月内容即将更新</div>';
  } else {
    data.forEach(function(sec){
      var secDone=sec.items.filter(function(_,i){return checked[sec.id+'_'+i];}).length;
      html+='<div class="wcard" id="wc-'+sec.id+'">'
        +'<div class="wcard-hdr" onclick="toggleSec(\''+sec.id+'\')">'
        +'<span class="wpill" style="background:'+sec.pc+';color:'+sec.pt+'">'+sec.pill+'</span>'
        +'<span class="wcard-title">'+sec.label+' <span style="font-size:11px;color:var(--text-muted);font-weight:400">'+sec.fr+'</span></span>'
        +'<span class="wcard-prog">'+secDone+'/'+sec.items.length+'</span>'
        +'<span class="wchev">⌄</span></div><div class="wbody">';
      sec.items.forEach(function(item,i){
        var id=sec.id+'_'+i;var ck=checked[id]||false;
        html+='<div class="todo'+(ck?' done':'')+'" onclick="chkTodo(\''+id+'\')">'
          +'<div class="tbox"><span class="tcheck">✓</span></div>'
          +'<div class="tcontent"><div class="ttext">'+item.t+'</div>'
          +'<div class="tmeta"><span class="tag t-'+item.tag+'">'+item.tl+'</span>'+item.fr+'</div></div></div>';
      });
      html+='</div></div>';
    });
  }

  // custom todos
  if(cx.length){
    html+='<p class="sec-label">自定义事项 <span style="background:#f7e8fc;color:#7a2fa0;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500">手动 / 导入</span></p>';
    html+='<div class="wcard" id="wc-cx">'
      +'<div class="wcard-hdr" onclick="toggleSec(\'cx\')">'
      +'<span class="wpill" style="background:#f7e8fc;color:#7a2fa0">✏️ 自定义</span>'
      +'<span class="wcard-title">我的待办</span>'
      +'<span class="wcard-prog">'+cx.filter(function(_,i){return checked['cx_'+m+'_'+i];}).length+'/'+cx.length+'</span>'
      +'<span class="wchev">⌄</span></div><div class="wbody">';
    cx.forEach(function(c,i){
      var id='cx_'+m+'_'+i;var ck=checked[id]||false;
      html+='<div class="todo'+(ck?' done':'')+'" onclick="chkTodo(\''+id+'\')">'
        +'<div class="tbox"><span class="tcheck">✓</span></div>'
        +'<div class="tcontent"><div class="ttext">'+c.t+'</div>'
        +'<div class="tmeta"><span class="tag" style="background:#f7e8fc;color:#7a2fa0">'+c.tl+'</span>'+(c.fr||'')
        +' <span onclick="delCTodo(event,'+i+')" style="color:#b84848;cursor:pointer;margin-left:8px;font-size:11px">删除</span>'
        +'</div></div></div>';
    });
    html+='</div></div>';
  }

  html+='<button class="add-btn" onclick="toggleAddForm(\'todoForm\')">＋ 添加自定义事项 · Ajouter une tâche</button>'
    +'<div class="add-form" id="todoForm">'
    +'<div class="form-title">新增待办事项</div>'
    +'<span class="form-label">事项内容（中文）*</span><input type="text" id="inT" placeholder="例：预约下周儿科复诊"/>'
    +'<span class="form-label">法语备注（可选）</span><input type="text" id="inFr" placeholder="Ex: Prendre rendez-vous pédiatre"/>'
    +'<span class="form-label">分类标签</span>'

    +'<option value="sante">医疗 / Santé</option>'
    +'<option value="admin">行政 / Admin</option>'
    +'<option value="oblig">义务 / Obligatoire</option>'
    +'<option value="parent">亲子 / Parent</option>'
    +'<option value="allait">喂养 / Alimentation</option>'
    +'<option value="daily">日常 / Quotidien</option>'
    +'</select>'
    +'<div class="add-row"><button class="btn-no" onclick="toggleAddForm(\'todoForm\')">取消</button>'
    +'<button class="btn-ok" onclick="addCTodo()">添加 ✓</button></div></div>';

  el.innerHTML=html;
  var first=el.querySelector('.wcard');if(first)first.classList.add('open');
}

function toggleSec(id){var el=document.getElementById('wc-'+id);if(el)el.classList.toggle('open');}
function chkTodo(id){
  var newVal=!checked[id];
  checked[id]=newVal;
  renderTodo();
  db.from('checked_items').upsert({id:id,checked:newVal,updated_at:new Date().toISOString()}).then(function(r){
    if(r.error)toast('❌ 同步失败');
  });
}
function toggleAddForm(id){document.getElementById(id).classList.toggle('open');}
function addCTodo(){
  var t=(document.getElementById('inT').value||'').trim();
  if(!t)return;
  var fr=(document.getElementById('inFr').value||'').trim();
  var tag=document.getElementById('inTag').value;
  var tagLabels={sante:'医疗',admin:'行政',oblig:'义务',parent:'亲子',allait:'喂养',daily:'日常'};
  var tl=tagLabels[tag]||'自定义';
  db.from('custom_todos').insert({month:S.month,text:t,fr:fr,tag:tag,tl:tl}).select().then(function(r){
    if(r.error){toast('❌ 添加失败');return;}
    getCTodos(S.month).push({id:r.data[0].id,t:t,fr:fr,tag:tag,tl:tl});
    renderTodo();
    toast('✅ 已添加并同步');
  });
}
function delCTodo(e,i){
  e.stopPropagation();
  if(!confirm('确认删除这项？'))return;
  var item=getCTodos(S.month)[i];
  getCTodos(S.month).splice(i,1);
  delete checked['cx_'+S.month+'_'+i];
  renderTodo();
  if(item&&item.id) db.from('custom_todos').delete().eq('id',item.id).then(function(r){if(r.error)toast('❌ 删除同步失败');});
}
function showExcelHelp(){
  alert('Excel 导入格式说明：\n\n第1行为标题行，从第2行起填写数据：\nA列：月份（第1个月 / 第2个月…）\nB列：分组名称（可自填）\nC列：事项内容（必填）\nD列：法语备注（可选）\nE列：分类中文（医疗/行政/亲子…）\nF列：分类英文（sante/admin/parent/allait/oblig/daily）\nG列：已完成（填"✓"标记为完成）\n\n提示：先点「导出 Excel」获取标准模板，在模板基础上增改后再导入。');
}

function toggleKb(i){var c=document.getElementById('kb'+i);if(c)c.classList.toggle('open');}

  var bg=document.getElementById('kbBg').value;

  db.from('custom_kb').insert({month:S.month,icon:icon,bg:bg,title:title,sub:sub||'自定义笔记',body:bodyHtml}).select().then(function(r){

function renderDoctor(){

  // stats

  var done=doctorQs.filter(function(q){return q.done;}).length;
  var urgent=doctorQs.filter(function(q){return q.urgent&&!q.done;}).length;

  var html='';

  // header card
  html+='<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:4px;backdrop-filter:blur(8px)">'
    +'<div style="display:flex;align-items:center;gap:14px">'
    +'<div style="width:48px;height:48px;border-radius:14px;background:#fce8e8;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🩺</div>'
    +'<div>'
    +'<div style="font-family:\'DM Serif Display\',serif;font-size:17px;color:var(--bark);margin-bottom:3px">咨询医生清单</div>'
    +'<div style="font-size:12px;color:var(--text-muted)">Questions pour le médecin / pédiatre</div>'
    +'</div></div>'
    +(urgent>0?'<div style="margin-top:12px;background:#fce8e8;border-left:3px solid #c84040;border-radius:0 8px 8px 0;padding:9px 12px;font-size:12px;color:#a03030">⚠️ 有 <strong>'+urgent+'</strong> 条紧急问题待咨询</div>':'')
    +'<div style="display:flex;gap:16px;margin-top:12px">'
    +'<div style="text-align:center;flex:1"><div style="font-size:20px;font-weight:500;color:var(--bark)">'+total+'</div><div style="font-size:11px;color:var(--text-muted)">总问题</div></div>'
    +'<div style="text-align:center;flex:1"><div style="font-size:20px;font-weight:500;color:#c84040">'+urgent+'</div><div style="font-size:11px;color:var(--text-muted)">紧急</div></div>'
    +'<div style="text-align:center;flex:1"><div style="font-size:20px;font-weight:500;color:var(--sage)">'+done+'</div><div style="font-size:11px;color:var(--text-muted)">已咨询</div></div>'
    +'</div></div>';

  // filter tabs
  html+='<div style="display:flex;gap:6px;margin:14px 0 10px;overflow-x:auto;scrollbar-width:none">'
    +['all','urgent','done'].map(function(f){
      var labels={all:'全部 ('+total+')',urgent:'⚠️ 紧急 ('+doctorQs.filter(function(q){return q.urgent&&!q.done;}).length+')',done:'✅ 已咨询 ('+done+')'};
      return '<button onclick="filterDoctor(\''+f+'\')" id="df-'+f+'" style="flex-shrink:0;font-family:\'DM Sans\',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:99px;border:1.5px solid var(--border);background:'+(S.doctorFilter===f?'var(--bark)':'var(--card)')+';color:'+(S.doctorFilter===f?'#fff':'var(--text-muted)')+';cursor:pointer">'+labels[f]+'</button>';
    }).join('')
    +'</div>';

  // question list
  var filtered=doctorQs.filter(function(q){
    if(S.doctorFilter==='urgent')return q.urgent&&!q.done;
    if(S.doctorFilter==='done')return q.done;
    return true;
  });

  if(filtered.length===0&&total===0){
    html+='<div class="empty"><span>💬</span>还没有问题，点下方按钮添加</div>';
  } else if(filtered.length===0){
    html+='<div class="empty"><span>✨</span>该分类暂无问题</div>';
  } else {
    html+='<div style="display:flex;flex-direction:column;gap:8px">';
    filtered.forEach(function(q,fi){
      var realIdx=doctorQs.indexOf(q);
      var borderColor=q.urgent?'#c84040':'var(--border)';
      var bgColor=q.done?'rgba(123,158,135,0.08)':'var(--card)';
      html+='<div style="background:'+bgColor+';border:1px solid '+borderColor+';border-radius:var(--r);padding:14px;backdrop-filter:blur(8px)'+(q.done?';opacity:0.6':'')+'">'
        +'<div style="display:flex;align-items:flex-start;gap:10px">'
        // checkbox
        +'<div onclick="toggleDoctorQ('+realIdx+')" style="width:22px;height:22px;flex-shrink:0;border:1.5px solid '+(q.done?'var(--sage)':'var(--peach)')+';border-radius:7px;background:'+(q.done?'var(--sage)':'transparent')+';display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px">'
        +(q.done?'<span style="color:#fff;font-size:12px">✓</span>':'')
        +'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:14px;line-height:1.5;color:var(--text);'+(q.done?'text-decoration:line-through':'')+'">'+escHtml(q.text)+'</div>'
        +(q.note?'<div style="font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.5">📝 '+escHtml(q.note)+'</div>':'')
        +'<div style="display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;align-items:center">'
        +(q.urgent?'<span style="background:#fce8e8;color:#a03030;font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px">⚠️ 紧急</span>':'')
        +(q.month?'<span style="background:var(--warm);color:var(--bark);font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px">'+q.month+'</span>':'')
        +(q.done&&q.answer?'<span style="background:var(--sage-light);color:#3d6b4f;font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px">已记录答案</span>':'')
        +'</div>'
        +(q.done&&q.answer?'<div style="margin-top:8px;background:var(--sage-light);border-radius:8px;padding:9px 11px;font-size:12px;color:#3d6b4f;line-height:1.6"><strong>医生回答：</strong>'+escHtml(q.answer)+'</div>':'')
        +'</div>'
        // delete btn
        +'<button onclick="deleteDoctorQ('+realIdx+')" style="flex-shrink:0;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;line-height:1" title="删除">×</button>'
        +'</div>'
        // answer input if done and no answer yet
        +(!q.done?'':'')
        +'</div>';
    });
    html+='</div>';
  }

  // Add question form
  html+='<button class="add-btn" style="border-color:#b8cfe8;color:var(--blue-deep);margin-top:12px" onclick="toggleAddForm(\'doctorForm\')">＋ 记录问题 · Ajouter une question</button>'
    +'<div class="add-form" id="doctorForm" style="background:#e8f2fc;border-color:var(--blue-soft)">'
    +'<div class="form-title" style="color:var(--blue-deep)">新增问题</div>'
    +'<span class="form-label">问题内容 *</span>'
    +'<input type="text" id="dqText" placeholder="例：宝宝大便是绿色的正常吗？"/>'
    +'<span class="form-label">补充说明（可选）</span>'
    +'<input type="text" id="dqNote" placeholder="例：从第3天开始，每天2–3次"/>'
    +'<span class="form-label">关联月龄（可选）</span>'
    +'<select id="dqMonth" style="margin-bottom:7px">'
    +'<option value="">不指定</option>'
    +MONTHS.map(function(m){return '<option value="'+m.zh+'">'+m.zh+'</option>';}).join('')
    +'</select>'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
    +'<input type="checkbox" id="dqUrgent" style="width:16px;height:16px;margin:0;accent-color:#c84040"/>'
    +'<label for="dqUrgent" style="font-size:13px;color:#a03030;font-weight:500;cursor:pointer">⚠️ 标记为紧急</label>'
    +'</div>'
    +'<div class="add-row"><button class="btn-no" onclick="toggleAddForm(\'doctorForm\')">取消</button>'
    +'<button class="btn-ok" onclick="addDoctorQ()">添加 ✓</button></div></div>';

  // Answer recording (shown below checked items via separate section)
  var answered=doctorQs.filter(function(q){return q.done&&!q.answer;});
  if(answered.length>0){
    html+='<p class="sec-label" style="margin-top:20px">📋 记录医生回答</p>';
    answered.forEach(function(q){
      var realIdx=doctorQs.indexOf(q);
      html+='<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px;margin-bottom:8px;backdrop-filter:blur(8px)">'
        +'<div style="font-size:13px;color:var(--bark);margin-bottom:8px;font-weight:500">💬 '+escHtml(q.text)+'</div>'
        +'<input type="text" id="ans-'+realIdx+'" placeholder="记录医生的回答…" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:#fff;font-family:\'DM Sans\',sans-serif;font-size:13px;color:var(--text);outline:none;margin-bottom:7px"/>'
        +'<button onclick="saveAnswer('+realIdx+')" style="width:100%;padding:9px;border-radius:8px;border:none;background:var(--sage);color:#fff;font-family:\'DM Sans\',sans-serif;font-size:13px;font-weight:500;cursor:pointer">保存回答</button>'
        +'</div>';
    });
  }

  el.innerHTML=html;
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filterDoctor(f){
  S.doctorFilter=f;
  renderDoctor();
}

function addDoctorQ(){
  var text=(document.getElementById('dqText').value||'').trim();
  if(!text){toast('⚠️ 请填写问题内容');return;}
  var note=(document.getElementById('dqNote').value||'').trim();
  var month=document.getElementById('dqMonth').value;
  var urgent=document.getElementById('dqUrgent').checked;
  db.from('doctor_questions').insert({text:text,note:note,month:month,urgent:urgent,done:false,answer:''}).select().then(function(r){
    if(r.error){toast('❌ 添加失败');return;}
    doctorQs.unshift({id:r.data[0].id,text:text,note:note,month:month,urgent:urgent,done:false,answer:''});
    toggleAddForm('doctorForm');
    renderDoctor();
    toast(urgent?'⚠️ 紧急问题已记录并同步！':'✅ 问题已记录并同步！');
  });
}

function toggleDoctorQ(idx){
  var q=doctorQs[idx];
  q.done=!q.done;
  renderDoctor();
  if(q.id) db.from('doctor_questions').update({done:q.done}).eq('id',q.id).then(function(r){if(r.error)toast('❌ 同步失败');});
}

function deleteDoctorQ(idx){
  if(!confirm('确认删除这个问题？'))return;
  var q=doctorQs[idx];
  doctorQs.splice(idx,1);
  renderDoctor();
  if(q.id) db.from('doctor_questions').delete().eq('id',q.id).then(function(r){if(r.error)toast('❌ 删除同步失败');});
}

function saveAnswer(idx){
  var val=(document.getElementById('ans-'+idx).value||'').trim();
  if(!val){toast('⚠️ 请填写回答内容');return;}
  doctorQs[idx].answer=val;
  renderDoctor();
  var q=doctorQs[idx];
  if(q.id) db.from('doctor_questions').update({answer:val}).eq('id',q.id).then(function(r){
    if(r.error)toast('❌ 同步失败');else toast('✅ 回答已保存并同步');
  });
}

      +'<div style="flex:1"><div class="vage">'+v.age+'</div>'
      +'<div class="vtext">'+v.zh+'</div>'
      +'<div class="vfr">'+v.fr+'</div></div>'
      +'<span class="tag '+(v.oblig?'t-oblig':'t-sante')+'" style="flex-shrink:0;align-self:flex-start;margin-top:2px">'+(v.oblig?'义务':'推荐')+'</span>'
      +'</div>';

    +'<strong>说明 / Note :</strong> 自2025年1月起，脑膜炎ACWY和B型均为强制义务接种。所有义务疫苗医疗保险<strong>100%报销</strong>。<br>'
    +'<em>Depuis janvier 2025, Méningocoque ACWY et B obligatoires. Tous remboursés à 100%.</em></div>'
    +'<p style="margin-top:9px;font-size:11px;color:var(--text-muted);text-align:center">Source : Calendrier vaccinal France 2025 · Ministère de la Santé · HAS</p>';
}

  await loadAll();
  setupRealtime();
}

document.getElementById('loginScreen').style.display='flex';
